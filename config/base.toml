[server]
host = "0.0.0.0"
port = 3000

[database]
url = "postgres://app:app@localhost:5432/task_api"
max_connections = 10
connect_timeout_secs = 5

[auth]
jwt_secret = "change-me-please-use-a-long-random-secret"
access_token_ttl_secs = 900
refresh_token_ttl_days = 30

[tracing]
filter = "info,task_auth_api=debug"
